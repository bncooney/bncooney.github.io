<!DOCTYPE html>
<html lang="en">
<head>
	<style>
:root {
    --primary-bg: #0a0a0a;
    --secondary-bg: #1a1a1a;
    --card-bg: #141414;
    --text-primary: #ffffff;
    --text-secondary: #b3b3b3;
    --text-muted: #666666;
    --accent-primary: #3b82f6;
    --accent-secondary: #60a5fa;
    --border-color: #333333;
    --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --card-gradient: linear-gradient(145deg, rgba(20, 20, 20, 0.8) 0%, rgba(26, 26, 26, 0.6) 100%);
    --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 80px rgba(59, 130, 246, 0.05);
    --accent-gradient: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
    --line-gradient: linear-gradient(90deg, transparent 0%, var(--accent-primary) 50%, transparent 100%)
}

*,::after,::before {
    margin: 0;
    padding: 0;
    box-sizing: border-box
}

html {
    scroll-behavior: smooth;
    background: var(--primary-bg);
    min-height: 100%
}

aside nav a:hover,body {
    color: var(--text-primary)
}

body {
    font-family: var(--font-primary);
    background: radial-gradient(ellipse at top,#1a1a1a 0%,var(--primary-bg) 100%);
    background-attachment: fixed;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    position: relative
}

body::after,body::before {
    content: "";
    position: fixed;
    left: 0;
    right: 0;
    height: 200vh;
    background: var(--primary-bg);
    z-index: -2
}

body::before {
    top: -100vh
}

body::after {
    bottom: -100vh
}

.container {
    display: flex;
    gap: 2rem;
    margin: 0 auto;
    align-items: flex-start
}

main {
    flex: 3;
    padding: 4rem 2rem
}

aside,aside h2,main {
    position: relative
}

aside {
    flex: 0 0 320px;
    background: var(--card-gradient);
    backdrop-filter: blur(20px);
    padding: 2rem;
    margin-top: 4rem;
    border-radius: 16px;
    border: 1px solid var(--border-color);
    box-shadow: var(--card-shadow);
    height: fit-content;
    max-width: 320px;
    overflow: hidden
}

article::before,aside::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--line-gradient)
}

aside h2 {
    margin-bottom: 1.5rem;
    font-size: 1.4rem;
    font-weight: 600;
    padding-bottom: .75rem;
    border-bottom: 1px solid var(--border-color)
}

aside h2::after {
    content: "";
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 40px;
    height: 2px;
    background: var(--accent-gradient);
    border-radius: 1px
}

aside nav a {
    display: block;
    margin-bottom: .75rem;
    padding: .75rem 1rem;
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 400;
    border-radius: 8px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    transition: all .3s ease;
    font-size: .95rem
}

aside nav a:hover {
    background: rgba(59,130,246,.1);
    border-color: rgba(59,130,246,.3);
    transform: translateX(4px)
}

article:last-child,aside nav a:last-child {
    margin-bottom: 0
}

header {
    padding: 2rem 1rem;
    background: linear-gradient(135deg,rgba(20,20,20,.95)0,rgba(26,26,26,.9) 50%,rgba(20,20,20,.95) 100%);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color)
}

h3,header h1 {
    letter-spacing: -.02em
}

header h1 {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: .5rem;
    z-index: 1
}

nav {
    margin-top: 1rem;
    z-index: 1
}

article,header,nav a {
    overflow: hidden
}

nav a {
    display: inline-block;
    margin-right: 2rem;
    padding: .75rem 1.5rem;
    text-decoration: none;
    font-weight: 500;
    border-radius: 50px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    transition: all .3s ease
}

nav a:hover {
    color: var(--text-primary);
    border-color: var(--accent-primary);
    box-shadow: 0 8px 32px rgba(59,130,246,.2);
    transform: translateY(-2px)
}

article {
    background: var(--card-gradient);
    border-radius: 24px;
    padding: 3rem;
    margin-bottom: 4rem;
    border: 1px solid var(--border-color);
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(20px)
}

h3 {
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.2
}

h4,h5 {
    font-weight: 600
}

article,h4,header,header h1,nav,nav a {
    position: relative
}

h4 {
    font-size: 1.75rem;
    margin: 3rem 0 1.5rem;
    padding-left: 1.5rem
}

h4::before {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 100%;
    background: linear-gradient(to bottom,var(--accent-primary),var(--accent-secondary));
    border-radius: 2px
}

h5 {
    font-size: 1.25rem;
    margin: 2rem 0 1rem;
    color: var(--accent-secondary);
    display: flex;
    align-items: center;
    gap: .5rem
}

h5::before {
    content: "▶";
    color: var(--accent-primary);
    font-size: .8rem
}

nav a,ol,p,ul {
    color: var(--text-secondary)
}

h3,p {
    margin-bottom: 1.5rem
}

p {
    font-size: 1.1rem;
    line-height: 1.8
}

ol,ul {
    margin: 1.5rem 0 2rem 2rem
}

li {
    margin-bottom: .8rem;
    font-size: 1rem;
    line-height: 1.7
}

ul li::marker {
    color: var(--accent-primary)
}

ol li::marker {
    color: var(--accent-secondary);
    font-weight: 600
}

strong {
    color: var(--accent-primary);
    font-weight: 600;
    background: rgba(59,130,246,.1);
    padding: .2rem .4rem;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: .9em;
    border: 1px solid rgba(59,130,246,.2)
}

footer,time {
    color: var(--text-muted)
}

time {
    font-size: .9rem;
    font-weight: 500;
    display: block;
    margin-bottom: 1rem;
    opacity: .8
}

footer {
    padding: 3rem 1rem;
    text-align: center;
    background: linear-gradient(135deg,rgba(10,10,10,.95)0,rgba(20,20,20,.9) 100%);
    border-top: 1px solid var(--border-color);
    position: relative;
    overflow: hidden
}

footer::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg,transparent 0%,var(--accent-secondary) 50%,transparent 100%)
}

.mobile-menu-button,.mobile-menu-toggle {
    display: none
}

@media (max-width:1400px) {
    aside {
        flex: 0 0 300px;
        max-width: 300px
    }
}

@media (max-width:1200px) {
    aside {
        flex: 0 0 280px;
        max-width: 280px
    }
}

@media (max-width:768px) {
    .container {
        flex-direction: column;
        gap: 1.5rem;
        position: relative
    }

    .mobile-menu-toggle {
        display: none
    }

    .mobile-menu-button {
        display: block;
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 1001;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: .75rem;
        cursor: pointer;
        transition: all .3s ease;
        box-shadow: 0 4px 12px rgba(0,0,0,.3)
    }

    .mobile-menu-button:hover {
        background: var(--secondary-bg);
        border-color: var(--accent-primary)
    }

    .mobile-menu-button::before {
        content: "☰";
        color: var(--text-primary);
        font-size: 1.2rem;
        line-height: 1
    }

    .mobile-menu-toggle:checked+.mobile-menu-button::before {
        content: "✕"
    }

    aside {
        position: fixed;
        top: 0;
        left: -100%;
        width: 280px;
        height: 100vh;
        z-index: 1000;
        flex: none;
        max-width: none;
        margin-top: 0;
        border-radius: 0;
        transition: left .3s ease;
        overflow-y: auto
    }

    .mobile-menu-toggle:checked~.container aside {
        left: 0
    }

    .mobile-menu-toggle:checked~.container::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,.5);
        z-index: 999;
        backdrop-filter: blur(2px)
    }

    h3,header h1 {
        font-size: 2rem
    }

    nav a {
        margin-right: 1rem;
        margin-bottom: .5rem;
        padding: .5rem 1rem;
        font-size: .9rem
    }

    main {
        padding: 2rem 1rem;
        flex: none
    }

    article {
        padding: 2rem;
        border-radius: 16px;
        margin-bottom: 2rem
    }

    h4 {
        font-size: 1.5rem
    }
}

@media (max-width:480px) {
    main {
        padding: 1rem .5rem
    }

    article {
        padding: 1.5rem;
        margin-bottom: 1.5rem
    }

    header {
        padding: 1.5rem 1rem
    }

    header h1 {
        font-size: 1.75rem
    }

    nav a {
        display: block;
        margin-right: 0;
        margin-bottom: .75rem;
        text-align: center
    }
}

@media (min-width:769px) {
    .mobile-menu-button,.mobile-menu-toggle {
        display: none
    }
}
</style>
